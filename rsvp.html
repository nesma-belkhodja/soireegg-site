<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP - SOIRAVE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="rsvp-page">
        <div class="rsvp-header">
            <img src="images/Logos/SOIREGG IV.jpg" alt="Soiregg Soirave" class="page-logo">
            <a href="index.html" class="back-link">← BACK TO HOME</a>
        </div>

        <div class="rsvp-form-container">
            <h2>RSVP</h2>
            <p class="rsvp-subtitle">SATURDAY MAY 16 • 11PM - 6AM</p>

            <form id="rsvpForm">
                <div class="form-group">
                    <label for="name">NAME*</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="phone">PHONE*</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label for="note">NOTE</label>
                    <textarea id="note" name="note" rows="4"></textarea>
                </div>

                <button type="submit" class="submit-btn">SUBMIT RSVP</button>
            </form>

            <p id="form-message" style="margin-top: 20px; text-align: center; display: none;"></p>
        </div>
    </div>

    <script type="module">
        // Import Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-database.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD9N3RZuDSfey1Cbe0I6K6ATB3gFYmUqhw",
            authDomain: "soiregg.firebaseapp.com",
            databaseURL: "https://soiregg-default-rtdb.firebaseio.com",
            projectId: "soiregg",
            storageBucket: "soiregg.firebasestorage.app",
            messagingSenderId: "654566555389",
            appId: "1:654566555389:web:4177b274634d1b7c7d4894"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const rsvpForm = document.getElementById("rsvpForm");
        const formMessage = document.getElementById("form-message");

        // Event listener for RSVP form submission
        rsvpForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const note = document.getElementById("note").value;

            const rsvp = {
                name,
                phone,
                note,
                date: new Date().toISOString()
            };

            try {
                const rsvpRef = ref(database, "rsvps");
                await push(rsvpRef, rsvp);

                // Show success message
                formMessage.textContent = "✓ RSVP submitted successfully!";
                formMessage.style.color = "#28a745";
                formMessage.style.display = "block";

                // Reset form
                rsvpForm.reset();

                // Redirect to success page after 2 seconds
                setTimeout(() => {
                    window.location.href = "success.html";
                }, 2000);
            } catch (error) {
                console.error("Error submitting RSVP:", error);
                formMessage.textContent = "✗ Error submitting RSVP. Please try again.";
                formMessage.style.color = "#dc3545";
                formMessage.style.display = "block";
            }
        });
    </script>
</body>
</html>
